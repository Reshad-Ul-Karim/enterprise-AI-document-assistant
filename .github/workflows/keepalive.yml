name: keep-alive

# Render's free tier spins the service down after 15 minutes idle; the next request then
# takes ~1 minute to wake. A reviewer opening the live URL cold would sit on a blank page
# for a minute and reasonably conclude the app is broken.
#
# This pings /health every 10 minutes to keep it warm.
#
# BE HONEST ABOUT WHAT THIS IS. It is a workaround for a free tier, not an architectural
# achievement, and the README says so. It is also not free of consequence: 750 instance
# hours/month is the free allowance, and 24/7 warmth is ~730 hours -- i.e. this consumes
# essentially the whole allowance to keep ONE service up. That is an acceptable trade for a
# submission window; it would be a bad trade for a real product, where you would either pay
# for an always-on instance or accept the cold start.
#
# The interview answer: "the cold start is the free tier's, not my app's -- my container
# boots in about two seconds. I keep it warm with a cron so you don't pay for my hosting
# choice, and I'd delete it the day this ran on a paid instance."

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# Never let a warm-up ping race itself.
concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping /health
        env:
          # Set this as a repo variable so a fork does not ping someone else's deployment:
          # Settings -> Secrets and variables -> Actions -> Variables -> New variable
          #   APP_URL = https://enterprise-ai-document-assistant.onrender.com
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::notice::APP_URL variable not set; nothing to ping. Skipping."
            exit 0
          fi

          # Generous timeout: a cold start legitimately takes ~60s, and a wake-up is a
          # SUCCESS, not a failure. Failing the job here would train us to ignore it.
          code=$(curl -s -o /tmp/health.json -w "%{http_code}" -m 120 "$APP_URL/health" || echo "000")
          echo "HTTP $code"
          cat /tmp/health.json 2>/dev/null || true
          echo

          if [ "$code" = "200" ]; then
            # Assert the thing that actually matters: the index is loaded. A 200 from a
            # service whose index failed to load is a green tick on a broken app.
            if grep -q '"index_loaded": *true' /tmp/health.json; then
              echo "::notice::warm, index loaded"
              exit 0
            fi
            echo "::error::200 but index_loaded is false -- the app is up and broken"
            exit 1
          fi

          echo "::error::health check returned $code"
          exit 1
