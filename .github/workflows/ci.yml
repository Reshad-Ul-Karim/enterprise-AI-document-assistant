name: ci

on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - name: lint
        run: ruff check src tests

      - name: import contract (core is protocol-free and provider-free)
        # Not a style check. This is what makes the README's architectural claims
        # falsifiable rather than trusted.
        run: lint-imports --config .importlinter

      - name: tests
        # The suite runs with NO API key and NO network -- core takes an injected Generator
        # Protocol, so a reviewer who has signed up for nothing still gets a green run.
        run: pytest -q

  runtime-image-has-no-torch:
    # The manifest test in tests/ asserts on requirements.txt. This asserts on the real
    # install closure in a clean environment, which is the thing that actually ships.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: assert the runtime closure is free of torch and the crash-risk packages
        run: |
          for pkg in torch transformers pyarrow tensorflow streamlit fastembed onnxruntime; do
            if pip show "$pkg" > /dev/null 2>&1; then
              echo "::error::$pkg is in the runtime closure."
              exit 1
            fi
          done
          echo "runtime closure is clean"

      - name: prove the upload path imports cleanly in the real image environment
        # This is the check that matters. langchain_text_splitters' __init__ reaches for
        # transformers when importable; on a box that also has tensorflow/pyarrow it aborts
        # at the C++ level -- uncatchable by try/except, so it kills the process on the
        # first upload and takes the public demo with it. Here, in a clean closure, it must
        # import and split without drama.
        run: |
          python - <<'PY'
          from langchain_text_splitters.character import RecursiveCharacterTextSplitter
          s = RecursiveCharacterTextSplitter(chunk_size=100, chunk_overlap=20)
          assert len(s.split_text("word " * 200)) > 1
          import sys
          assert "transformers" not in sys.modules, "transformers got imported after all"
          print("upload path imports cleanly; no transformers")
          PY
